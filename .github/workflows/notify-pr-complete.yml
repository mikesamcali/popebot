name: Notify PR Complete

on:
  workflow_run:
    workflows: ["Auto-Merge Job PR"]
    types: [completed]

jobs:
  notify:
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    if: startsWith(github.event.workflow_run.head_branch, 'job/')
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Get PR number
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          echo "Searching PR for branch: $BRANCH"
          # Try workflow_run.pull_requests first
          PR_NUMBER=$(echo '${{ toJson(github.event.workflow_run.pull_requests) }}' | jq -r '.[0].number // empty')
          # Fallback: look up PR by head branch (state all includes merged)
          if [ -z "$PR_NUMBER" ]; then
            PR_NUMBER=$(gh pr list --head "$BRANCH" --state all --repo "${{ github.repository }}" --json number -q '.[0].number')
          fi
          # Second fallback: search by branch name
          if [ -z "$PR_NUMBER" ]; then
            PR_NUMBER=$(gh pr list --search "$BRANCH" --state all --repo "${{ github.repository }}" --json number -q '.[0].number')
          fi
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR found for branch $BRANCH - skipping notification"
            exit 0
          fi
          PR_URL=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json url -q '.url')
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "Found PR #$PR_NUMBER"

      - name: Ensure clean working directory
        if: steps.pr.outputs.number \!= ''
        run: |
          git reset --hard
          git clean -fdx

      - name: Checkout PR branch
        if: steps.pr.outputs.number \!= ''
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Gather job results and notify
        if: steps.pr.outputs.number \!= ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ steps.pr.outputs.number }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          JOB_ID="${BRANCH#job/}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}"
          PR_MERGED=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json mergedAt -q '.mergedAt')
          if [ -n "$PR_MERGED" ] && [ "$PR_MERGED" \!= "null" ]; then
            MERGE_RESULT="merged"
          else
            MERGE_RESULT="not_merged"
          fi
          JOB_CONTENT=""
          if [ -f "logs/${JOB_ID}/job.md" ]; then
            JOB_CONTENT=$(cat "logs/${JOB_ID}/job.md")
          fi
          COMMIT_MSG=$(gh pr view "$PR_NUMBER" --json commits --jq '.commits[-1].messageHeadline' --repo "${{ github.repository }}" 2>/dev/null || echo "")
          CHANGED_FILES=$(gh pr diff "$PR_NUMBER" --name-only --repo "${{ github.repository }}" 2>/dev/null || echo "")
          PR_STATUS=$(gh pr view "$PR_NUMBER" --json state --jq '.state' --repo "${{ github.repository }}" 2>/dev/null || echo "open")
          COMMIT_SHA="${{ github.event.workflow_run.head_sha }}"
          if [ "$MERGE_RESULT" = "merged" ]; then
            STATUS="completed"
          else
            STATUS="$PR_STATUS"
          fi
          jq -n             --arg job_id "$JOB_ID"             --arg branch "$BRANCH"             --arg status "$STATUS"             --arg job "$JOB_CONTENT"             --arg run_url "$RUN_URL"             --arg pr_url "${{ steps.pr.outputs.url }}"             --arg commit_message "$COMMIT_MSG"             --arg changed_files "$CHANGED_FILES"             --arg commit_sha "$COMMIT_SHA"             --arg merge_result "$MERGE_RESULT"             '{
              job_id: $job_id,
              branch: $branch,
              status: $status,
              job: $job,
              run_url: $run_url,
              pr_url: $pr_url,
              changed_files: ($changed_files | split("\n") | map(select(length > 0))),
              commit_message: $commit_message,
              commit_sha: $commit_sha,
              merge_result: $merge_result
            }' > /tmp/payload.json
          curl -s -X POST "${{ vars.APP_URL }}/api/github/webhook"             -H "Content-Type: application/json"             -H "X-GitHub-Webhook-Secret-Token: ${{ secrets.GH_WEBHOOK_SECRET }}"             -d @/tmp/payload.json
